AWSTemplateFormatVersion: 2010-09-09
Description: CloudFormation template for DMS - dms-cf-us-east-1-086997587178-sandbox-dlh

Parameters: 
  pExportS3StackName:
    Default: s3-cf-us-east-1-086997587178-sandbox-dlh
    Description: The name of the s3 stack that exports values
    Type: String

  pExportRolesStackName:
    Default: roles-cf-us-east-1-086997587178-sandbox-dlh
    Description: The name of the iam roles stack that exports values
    Type: String    

  pExportRdsStackName:
    Default: rds-cf-us-east-1-086997587178-sandbox-dlh
    Description: The name of the rds stack that exports values
    Type: String    

  pExportSecretStackName:
    Default: rds-cf-us-east-1-086997587178-sandbox-dlh
    Description: The ARN of the Secrets Manager secret for PostgreSQL instance
    Type: String        

  pEnv:
    Default: sandbox
    Description: The custom Env to stack
    Type: String

  pSolution:
    Default: dlh
    Description: The custom Env to stack
    Type: String


Resources: 
  vpcEndpointS3: # Due to DMS stays in a private subnet, it needs to be able to access the S3 bucket
    Type: AWS::EC2::VPCEndpoint #This VPC Endpoint allows DMS to access the S3 bucket
    Properties:
      PolicyDocument:
        Version: 2012-10-17
        Statement:
          - Effect: Allow
            Principal: '*'
            Action:
              - '*'
            Resource:
              - '*'
      RouteTableIds:
        - rtb-0635910e28774564c
      ServiceName: !Sub 'com.amazonaws.${AWS::Region}.s3'
      VpcId: vpc-0a47483b284f92f88


  rReplicationInstance:
    Type: AWS::DMS::ReplicationInstance
    Properties:
      AllocatedStorage: 50
      EngineVersion: 3.6.1 #https://docs.aws.amazon.com/dms/latest/userguide/CHAP_ReleaseNotes.html
      AutoMinorVersionUpgrade: false # Disable automatic minor upgrade
      MultiAZ: false # Disable Multi AZ
      ReplicationInstanceClass: dms.t3.small # Replication Instance Class
      ReplicationInstanceIdentifier: !Sub dms-rds-s3-${AWS::Region}-${AWS::AccountId}-${pEnv}-${pSolution} # Replication Instance Identifier
      ReplicationSubnetGroupIdentifier: !Ref rReplicationSubnetGroup # Replication Subnet Group Identifier
      PubliclyAccessible: false # Disable Public Access
      VpcSecurityGroupIds: 
        - sg-0b11200b3d99fa074




  rReplicationSubnetGroup:
    Type: AWS::DMS::ReplicationSubnetGroup
    Properties: 
      ReplicationSubnetGroupDescription: !Sub Subnet group for DMS in ${pEnv} for ${pSolution}
      SubnetIds: 
        - subnet-0841597260b518462 #(us-east-1a) 
        - subnet-04e94d118d801803f #(us-east-1b) 

  # DMS Endpoint for the Source RDS PostgreSQL Database.
  # This endpoint is required so DMS knows how and where to connect to the source database.
  # The credentials are securely pulled from AWS Secrets Manager for enhanced security.
  # - SslMode is set to 'require' to ensure encrypted communication.
  # - ExtraConnectionAttributes enable Heartbeat tables, which are useful for monitoring replication lag.
  # - ServerName is imported, generally as the RDS endpoint address.
  # - The EndpointIdentifier value uniquely identifies this endpoint resource within DMS.
  
  rEndpointRDS:
    Type: AWS::DMS::Endpoint
    Properties:
      EndpointIdentifier: !Sub endpoint-rds-postgresql-${AWS::Region}-${AWS::AccountId}-${pEnv}-${pSolution} 
      EndpointType: source                  # Specifies this as the source endpoint for migration.
      EngineName: postgres                  # Must match the source DB engine (see https://docs.aws.amazon.com/dms/latest/userguide/CHAP_Endpoints.html)
      Username: !Join ['', ['{{resolve:secretsmanager:', Fn::ImportValue: !Sub '${pExportSecretStackName}-oSecretARN', ':SecretString:username}}' ]]   # Dynamic username from Secrets Manager
      Password: !Join ['', ['{{resolve:secretsmanager:', Fn::ImportValue: !Sub '${pExportSecretStackName}-oSecretARN', ':SecretString:password}}' ]]   # Dynamic password from Secrets Manager
      SslMode: require                      # Enforces SSL for the DB connection
      ServerName: !ImportValue
        'Fn::Sub': '${pExportRdsStackName}-oRDSDBInstanceEndpoint'   # RDS endpoint hostname
      Port: 5432                            # Default PostgreSQL port
      DatabaseName: motorinc_oltp           # Name of the source database
      ExtraConnectionAttributes: "heartbeatEnable=Y;heartbeatSchema=public;heartbeatFrequency=15" # Enables heartbeat for monitoring lag, stores in public schema

  # DMS S3 Target Endpoint:
  # This endpoint is used by AWS DMS as the target to write data into Amazon S3.
  rEndpointS3:
    Type: AWS::DMS::Endpoint
    Properties:
      EndpointIdentifier: !Sub endpoint-s3-datalake-${AWS::Region}-${AWS::AccountId}-${pEnv}-${pSolution}
      EndpointType: target
      EngineName: s3
      ExtraConnectionAttributes: "useTaskStartTimeForFullLoadTimestamp=false;dataFormat=parquet;maxFileSize=131072;timestampColumnName=extract_at;addColumnName=true;includeOpForFullLoad=true;cdcMaxBatchInterval=60;cdcMinFileSize=32768"            
      S3Settings: # https://docs.aws.amazon.com/dms/latest/APIReference/API_S3Settings.html
        ParquetVersion: PARQUET_2_0
        BucketFolder: commercial/erp
        BucketName: !ImportValue
          'Fn::Sub': '${pExportS3StackName}-oS3BucketNameBronze'
        CompressionType: GZIP
        DatePartitionEnabled: true
        DatePartitionSequence: YYYYMMDDHH # uses UTC timestamp for partitioning (per hour basis)
        DatePartitionDelimiter: SLASH   
        DatePartitionTimezone: America/Sao_Paulo # partitioning will use this timezone as reference
        ServiceAccessRoleArn: !ImportValue
          'Fn::Sub': '${pExportRolesStackName}-oDMSS3Role'

  rReplicationTaskTables:
    Type: AWS::DMS::ReplicationTask
    Properties:
      ReplicationTaskIdentifier: !Sub task-ingestion-rds-s3-tables-${AWS::Region}-${AWS::AccountId}-${pEnv}-${pSolution}
      SourceEndpointArn: !Ref rEndpointRDS
      TargetEndpointArn: !Ref rEndpointS3

      ReplicationInstanceArn: !Ref rReplicationInstance
      MigrationType: cdc #full-load | cdc | full-load-and-cdc > https://docs.aws.amazon.com/dms/latest/userguide/CHAP_Task.CDC.html
      #https://repost.aws/questions/QUnVhI5OnCRyC-yeJUfRczxw/dms-task-does-not-put-full-load-file-inside-partition-folders
      #https://docs.aws.amazon.com/dms/latest/userguide/CHAP_Target.S3.html#CHAP_Target.S3.DatePartitioning
      #Date partitioning in full-load is not supported, so full-load-and-cdc is used instead
      TableMappings: |
        {
          "rules": [
            {
              "rule-type": "selection",
              "rule-id": "1",
              "rule-name": "1",
              "object-locator": {
                "schema-name": "public",
                "table-name": "customers"
              },
              "rule-action": "explicit"
            },
            {
              "rule-type": "selection",
              "rule-id": "2",
              "rule-name": "2",
              "object-locator": {
                "schema-name": "public",
                "table-name": "employees"
              },
              "rule-action": "explicit"
            },
            {
              "rule-type": "selection",
              "rule-id": "3",
              "rule-name": "3",
              "object-locator": {
                "schema-name": "public",
                "table-name": "offices"
              },
              "rule-action": "explicit"
            },
            {
              "rule-type": "selection",
              "rule-id": "4",
              "rule-name": "4",
              "object-locator": {
                "schema-name": "public",
                "table-name": "orderdetails"
              },
              "rule-action": "explicit"
            },
            {
              "rule-type": "selection",
              "rule-id": "5",
              "rule-name": "5",
              "object-locator": {
                "schema-name": "public",
                "table-name": "orders"
              },
              "rule-action": "explicit"
            },
            {
              "rule-type": "selection",
              "rule-id": "6",
              "rule-name": "6",
              "object-locator": {
                "schema-name": "public",
                "table-name": "products"
              },
              "rule-action": "explicit"
            }
          ]
        }
      ReplicationTaskSettings: |
        {
          "Logging": {
            "EnableLogging": true,
            "EnableLogContext": false,
            "LogComponents": [
              {
                "Severity": "LOGGER_SEVERITY_DEFAULT",
                "Id": "DATA_STRUCTURE"
              },
              {
                "Severity": "LOGGER_SEVERITY_DEFAULT",
                "Id": "COMMUNICATION"
              },
              {
                "Severity": "LOGGER_SEVERITY_DEFAULT",
                "Id": "IO"
              },
              {
                "Severity": "LOGGER_SEVERITY_DEFAULT",
                "Id": "COMMON"
              },
              {
                "Severity": "LOGGER_SEVERITY_DEFAULT",
                "Id": "FILE_FACTORY"
              },
              {
                "Severity": "LOGGER_SEVERITY_DEFAULT",
                "Id": "FILE_TRANSFER"
              },
              {
                "Severity": "LOGGER_SEVERITY_DEFAULT",
                "Id": "REST_SERVER"
              },
              {
                "Severity": "LOGGER_SEVERITY_DEFAULT",
                "Id": "ADDONS"
              },
              {
                "Severity": "LOGGER_SEVERITY_DEFAULT",
                "Id": "TARGET_LOAD"
              },
              {
                "Severity": "LOGGER_SEVERITY_DEFAULT",
                "Id": "TARGET_APPLY"
              },
              {
                "Severity": "LOGGER_SEVERITY_DEFAULT",
                "Id": "SOURCE_UNLOAD"
              },
              {
                "Severity": "LOGGER_SEVERITY_DEFAULT",
                "Id": "SOURCE_CAPTURE"
              },
              {
                "Severity": "LOGGER_SEVERITY_DEFAULT",
                "Id": "TRANSFORMATION"
              },
              {
                "Severity": "LOGGER_SEVERITY_DEFAULT",
                "Id": "SORTER"
              },
              {
                "Severity": "LOGGER_SEVERITY_DEFAULT",
                "Id": "TASK_MANAGER"
              },
              {
                "Severity": "LOGGER_SEVERITY_DEFAULT",
                "Id": "TABLES_MANAGER"
              },
              {
                "Severity": "LOGGER_SEVERITY_DEFAULT",
                "Id": "METADATA_MANAGER"
              },
              {
                "Severity": "LOGGER_SEVERITY_DEFAULT",
                "Id": "PERFORMANCE"
              },
              {
                "Severity": "LOGGER_SEVERITY_DEFAULT",
                "Id": "VALIDATOR_EXT"
              }
            ],
            "LogConfiguration": {
                "TraceOnErrorMb": 10,
                "EnableTraceOnError": false
            },
            "CloudWatchLogGroup": null,
            "CloudWatchLogStream": null
          },
          "StreamBufferSettings": {
            "StreamBufferCount": 3,
            "CtrlStreamBufferSizeInMB": 5,
            "StreamBufferSizeInMB": 8
          },
          "ErrorBehavior": {
            "FailOnNoTablesCaptured": true,
            "ApplyErrorUpdatePolicy": "LOG_ERROR",
            "FailOnTransactionConsistencyBreached": false,
            "RecoverableErrorThrottlingMax": 1800,
            "DataErrorEscalationPolicy": "SUSPEND_TABLE",
            "ApplyErrorEscalationCount": 0,
            "RecoverableErrorStopRetryAfterThrottlingMax": true,
            "RecoverableErrorThrottling": true,
            "ApplyErrorFailOnTruncationDdl": false,
            "DataTruncationErrorPolicy": "LOG_ERROR",
            "ApplyErrorInsertPolicy": "LOG_ERROR",
            "EventErrorPolicy": "IGNORE",
            "ApplyErrorEscalationPolicy": "LOG_ERROR",
            "RecoverableErrorCount": -1,
            "DataErrorEscalationCount": 0,
            "TableErrorEscalationPolicy": "STOP_TASK",
            "RecoverableErrorInterval": 5,
            "ApplyErrorDeletePolicy": "IGNORE_RECORD",
            "TableErrorEscalationCount": 0,
            "FullLoadIgnoreConflicts": true,
            "DataErrorPolicy": "LOG_ERROR",
            "TableErrorPolicy": "SUSPEND_TABLE"
          },
          "TTSettings": null,
          "FullLoadSettings": {
            "CommitRate": 10000,
            "StopTaskCachedChangesApplied": false,
            "StopTaskCachedChangesNotApplied": false,
            "MaxFullLoadSubTasks": 8,
            "TransactionConsistencyTimeout": 600,
            "CreatePkAfterFullLoad": false,
            "TargetTablePrepMode": "DROP_AND_CREATE"
          },
          "TargetMetadata": {
            "ParallelApplyBufferSize": 0,
            "ParallelApplyQueuesPerThread": 0,
            "ParallelApplyThreads": 0,
            "TargetSchema": "",
            "InlineLobMaxSize": 0,
            "ParallelLoadQueuesPerThread": 0,
            "SupportLobs": true,
            "LobChunkSize": 64,
            "TaskRecoveryTableEnabled": false,
            "ParallelLoadThreads": 0,
            "LobMaxSize": 32,
            "BatchApplyEnabled": false,
            "FullLobMode": false,
            "LimitedSizeLobMode": true,
            "LoadMaxFileSize": 0,
            "ParallelLoadBufferSize": 0
          },
          "BeforeImageSettings": null,
          "ControlTablesSettings": {
            "historyTimeslotInMinutes": 5,
            "HistoryTimeslotInMinutes": 5,
            "StatusTableEnabled": false,
            "SuspendedTablesTableEnabled": false,
            "HistoryTableEnabled": false,
            "ControlSchema": "",
            "FullLoadExceptionTableEnabled": false
          },
          "LoopbackPreventionSettings": null,
          "CharacterSetSettings": null,
          "FailTaskWhenCleanTaskResourceFailed": false,
          "ChangeProcessingTuning": {
            "StatementCacheSize": 50,
            "CommitTimeout": 1,
            "BatchApplyPreserveTransaction": true,
            "BatchApplyTimeoutMin": 1,
            "BatchSplitSize": 0,
            "BatchApplyTimeoutMax": 30,
            "MinTransactionSize": 1000,
            "MemoryKeepTime": 60,
            "BatchApplyMemoryLimit": 500,
            "MemoryLimitTotal": 1024
          },
          "ChangeProcessingDdlHandlingPolicy": {
            "HandleSourceTableDropped": true,
            "HandleSourceTableTruncated": true,
            "HandleSourceTableAltered": true
          },
          "PostProcessingRules": null
        }